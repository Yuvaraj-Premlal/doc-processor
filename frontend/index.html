<!DOCTYPE html>
<html>
<head>
  <title>Document Bundle Viewer</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    .section { margin-top: 30px; }
    .row { display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap: wrap; }
    .muted { color:#666; font-size: 13px; }
    .ok { color: #0a7a0a; font-weight: 600; }
    .err { color: #b00020; font-weight: 600; }
    .processing { color: #d97706; font-weight: 600; }
    .box { padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 18px; }
    button { padding: 6px 10px; cursor:pointer; }
    input[type="text"], input[type="date"], select { padding: 6px; }
    tr.clickable:hover { background:#f2f7ff; cursor:pointer; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; border:1px solid #ddd; }
    .pill.ok { border-color:#0a7a0a; }
    .pill.err { border-color:#b00020; }
    .pill.processing { border-color:#d97706; }
    .small { font-size: 12px; }
  </style>
</head>
<body>

<h2>Document Bundle Viewer</h2>

<!-- Upload -->
<div class="box">
  <div class="row">
    <input type="file" id="fileInput" multiple />
    <button onclick="uploadFiles()">Upload</button>
    <span class="muted">Upload PDF(s) or a ZIP containing PDFs</span>
  </div>
  <div id="uploadStatus" class="muted"></div>
</div>

<!-- Manual Load -->
<div class="box">
  <div class="row">
    <input type="text" id="jobIdInput" placeholder="Enter Job ID" style="width:520px;">
    <button onclick="loadJob()">Load</button>
  </div>
  <div id="loadStatus" class="muted"></div>
</div>

<!-- Filters + Results -->
<div class="box">
  <div class="row">
    <h3 style="margin:0;">Processed Bundles</h3>
    <span class="muted small">Filter by CEVA INVOICE DATE</span>
  </div>

  <div class="row">
    <label class="small">Quick:</label>
    <select id="rangeSelect" onchange="onRangeChange()">
      <option value="all">All</option>
      <option value="last_7_days">Last 7 days</option>
      <option value="last_30_days">Last 30 days</option>
      <option value="last_month">Last month</option>
    </select>

    <label class="small">From:</label>
    <input type="date" id="invoiceFrom" />

    <label class="small">To:</label>
    <input type="date" id="invoiceTo" />

    <button onclick="applyFilters()">Apply</button>
    <button onclick="clearFilters()">Clear</button>
    <button onclick="downloadExcelFiltered()">Download Excel (filtered)</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Job ID</th>
        <th>File Name</th>
        <th>CEVA INVOICE DATE</th>
        <th>Created</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
  </table>

  <div class="row">
    <button onclick="loadMore()">Load More</button>
    <span id="moreHint" class="muted small"></span>
  </div>
</div>

<div id="output"></div>

<script>
let continuationToken = null;
let currentJobPolling = null;

function apiBase() {
  return "https://yavi-b4bahkdqced4ayhh.canadacentral-01.azurewebsites.net/api";
}

function statusClass(status) {
  if (status === "completed") return "ok";
  if (status === "failed") return "err";
  if (status === "processing") return "processing";
  return "";
}

function getFilters() {
  const range = document.getElementById("rangeSelect").value;
  const invoiceFrom = document.getElementById("invoiceFrom").value; // YYYY-MM-DD
  const invoiceTo = document.getElementById("invoiceTo").value;     // YYYY-MM-DD
  return { range, invoiceFrom, invoiceTo };
}

function buildResultsUrl(pageSize=20) {
  const { range, invoiceFrom, invoiceTo } = getFilters();
  let url = `${apiBase()}/results?pageSize=${pageSize}`;

  if (range && range !== "all") url += `&range=${encodeURIComponent(range)}`;
  if (invoiceFrom) url += `&invoiceFrom=${encodeURIComponent(invoiceFrom)}`;
  if (invoiceTo) url += `&invoiceTo=${encodeURIComponent(invoiceTo)}`;

  if (continuationToken) url += `&token=${encodeURIComponent(continuationToken)}`;
  return url;
}

async function uploadFiles() {
  const el = document.getElementById("fileInput");
  const statusEl = document.getElementById("uploadStatus");
  statusEl.className = "muted";
  statusEl.textContent = "";

  if (!el.files.length) {
    statusEl.className = "err";
    statusEl.textContent = "Select PDF(s) or ZIP.";
    return;
  }

  const fd = new FormData();
  for (const f of el.files) fd.append("files", f);

  statusEl.textContent = "Uploading...";

  try {
    const res = await fetch(`${apiBase()}/upload`, { method:"POST", body: fd });
    const text = await res.text();

    if (!res.ok) {
      statusEl.className = "err";
      statusEl.textContent = `Upload failed (${res.status}): ${text}`;
      return;
    }

    const data = JSON.parse(text);

    if (data.jobId) {
      statusEl.className = "ok";
      statusEl.textContent = `Uploaded. Job ID: ${data.jobId}`;
      document.getElementById("jobIdInput").value = data.jobId;
      await refreshResults();
      loadJob(data.jobId);
      return;
    }

    const jobs = data.jobs || [];
    statusEl.className = "ok";
    statusEl.textContent = `Uploaded ZIP batch (${data.batchId}). Created ${jobs.length} job(s).`;

    await refreshResults();

    if (jobs.length) {
      document.getElementById("jobIdInput").value = jobs[0].jobId;
      loadJob(jobs[0].jobId);
    }

  } catch (e) {
    statusEl.className = "err";
    statusEl.textContent = "Connection error while uploading: " + e;
  }
}

async function loadResults(reset=false) {
  if (reset) {
    continuationToken = null;
    document.getElementById("resultsTable").innerHTML = "";
  }

  const url = buildResultsUrl(20);
  const res = await fetch(url);
  const data = await res.json();

  const tbody = document.getElementById("resultsTable");

  (data.items || []).forEach(item => {
    const tr = document.createElement("tr");
    tr.className = "clickable";
    tr.onclick = () => loadJob(item.id);

    const cls = statusClass(item.status);
    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.fileName || ""}</td>
      <td>${item.cevaInvoiceDate || ""}</td>
      <td>${item.createdAt || ""}</td>
      <td><span class="pill ${cls}">${item.status || ""}</span></td>
    `;
    tbody.appendChild(tr);
  });

  continuationToken = data.continuationToken;
  document.getElementById("moreHint").textContent =
    continuationToken ? "More available…" : "End of list.";
}

function loadMore() {
  if (continuationToken) loadResults(false);
}

async function refreshResults() {
  await loadResults(true);
}

function onRangeChange() {
  const range = document.getElementById("rangeSelect").value;
  if (range !== "all") {
    document.getElementById("invoiceFrom").value = "";
    document.getElementById("invoiceTo").value = "";
  }
}

async function applyFilters() {
  continuationToken = null;
  await refreshResults();
}

async function clearFilters() {
  document.getElementById("rangeSelect").value = "all";
  document.getElementById("invoiceFrom").value = "";
  document.getElementById("invoiceTo").value = "";
  continuationToken = null;
  await refreshResults();
}

function downloadExcelFiltered() {
  const { range, invoiceFrom, invoiceTo } = getFilters();
  const params = [];

  if (range && range !== "all") params.push(`range=${encodeURIComponent(range)}`);
  if (invoiceFrom) params.push(`invoiceFrom=${encodeURIComponent(invoiceFrom)}`);
  if (invoiceTo) params.push(`invoiceTo=${encodeURIComponent(invoiceTo)}`);

  const url = `${apiBase()}/results/excel` + (params.length ? `?${params.join("&")}` : "");
  window.location.href = url;
}

async function loadJob(jobIdOverride) {
  const jobId = (jobIdOverride || document.getElementById("jobIdInput").value).trim();
  const loadStatus = document.getElementById("loadStatus");

  if (!jobId) {
    loadStatus.className = "err";
    loadStatus.textContent = "Enter Job ID";
    return;
  }

  document.getElementById("jobIdInput").value = jobId;
  loadStatus.className = "muted";
  loadStatus.textContent = "Loading...";

  try {
    const res = await fetch(`${apiBase()}/job/${jobId}/ui`);
    const data = await res.json();

    if (data.status === "processing") {
      loadStatus.className = "processing";
      loadStatus.textContent = "Processing... (auto-refresh every 3 seconds)";
      if (!currentJobPolling) currentJobPolling = setInterval(() => loadJob(jobId), 3000);
      return;
    }

    if (currentJobPolling) {
      clearInterval(currentJobPolling);
      currentJobPolling = null;
    }

    if (data.status === "failed") {
      loadStatus.className = "err";
      loadStatus.textContent = "Processing failed.";
      document.getElementById("output").innerHTML = `<p class="err">${data.error || "Unknown error"}</p>`;
      return;
    }

    loadStatus.className = "ok";
    loadStatus.textContent = "Loaded.";
    renderDetails(data);

  } catch (e) {
    if (currentJobPolling) {
      clearInterval(currentJobPolling);
      currentJobPolling = null;
    }
    loadStatus.className = "err";
    loadStatus.textContent = "Connection error.";
    document.getElementById("output").innerHTML = "<p class='err'>Connection error. Check CORS / API.</p>";
  }
}

function renderDetails(data) {
  let html = "";
  html += renderSection("CEVA", data.ceva);
  html += renderSection("Entry Summary", data.entry_summary);
  html += renderPartsWorksheet(data.parts_worksheet);
  document.getElementById("output").innerHTML = html;
}

function renderSection(title, obj) {
  let html = `<div class="section"><h3>${title}</h3><table>`;
  for (const key in (obj || {})) {
    html += `<tr><th>${key}</th><td>${obj[key] ?? ""}</td></tr>`;
  }
  html += "</table></div>";
  return html;
}

function renderPartsWorksheet(obj) {
  let html = `<div class="section"><h3>Parts Worksheet</h3>`;
  html += `<p><strong>Supplier:</strong> ${obj?.Supplier || ""}</p>`;

  const lineItems = obj?.LineItems;
  if (Array.isArray(lineItems) && lineItems.length > 0) {
    html += "<table><tr>";
    const headers = Object.keys(lineItems[0] || {});
    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    lineItems.forEach(item => {
      html += "<tr>";
      headers.forEach(h => html += `<td>${(item && item[h] != null) ? item[h] : ""}</td>`);
      html += "</tr>";
    });

    html += "</table>";
  } else {
    html += `<p class="muted">No line items found.</p>`;
  }

  html += "</div>";
  return html;
}

// Initial load
refreshResults();
</script>
</body>
</html>
